[[permission]]
identifier = "main"
description = "Permissions for main application commands"
commands.allow = [
    "get_sessions",
    "get_session",
    "get_session_stats",
    "get_agent_analytics",
    "get_timeline",
    "search_sessions",
    "resolve_permission",
    "answer_question",
    "jump_to_session",
    "stop_agent",
    "shutdown",
    "discover_agents",
    "ping",
    "set_ignore_cursor",
    "update_window_size",
    "start_drag",
    "ensure_always_on_top"
]
